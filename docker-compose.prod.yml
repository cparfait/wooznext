services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wooznext
      POSTGRES_USER: wooznext
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wooznext"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/cparfait/wooznext:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      DATABASE_URL: postgresql://wooznext:${DB_PASSWORD}@db:5432/wooznext
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      PHONE_PEPPER: ${PHONE_PEPPER}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
