services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cparfait
      POSTGRES_USER: cparfait
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cparfait_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cparfait"]
      interval: 5s
      timeout: 5s
      retries: 5
    # NOT exposed on host in production (internal network only)

  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://cparfait:${DB_PASSWORD:-cparfait_secret}@db:5432/cparfait
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
