version: '3.8'

# Development override - only starts PostgreSQL
# Use with: docker-compose -f docker-compose.dev.yml up -d
# Then run the app locally with: npm run dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cparfait
      POSTGRES_USER: cparfait
      POSTGRES_PASSWORD: cparfait_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cparfait"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
